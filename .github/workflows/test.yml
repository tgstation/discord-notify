name: 'test'
on: 
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v6
       - name: Setup node
         uses: actions/setup-node@v6
         with:
            node-version: 24.x
       - name: Install dependencies
         run: |
                  npm ci
                  npm ls
       - name: discord notify all options
         uses: ./ # Uses an action in the root directory
         with:
            webhook_url: https://discord.com/api/webhooks/1514217727437307924/Bu_5L1ACFwG0XOCjzNOf4O-dJvr7HKFdFeLByroyOOGHRSVb-23m94S8mqMQrCYBqazn
            title: Test Title
            message: Test Message
            include_image: true
            avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
            username: TestUsername
            colour: '#3371FF'
       - name: Validate dist
         run: |
              npm i -g rollup
              cp dist/main.js index_pr.js
              rm -rf out dist
              npm run build
              npm run package
              diff dist/main.js index_pr.js
