name: 'test'
on: 
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v6
       - name: Setup node
         uses: actions/setup-node@v6
         with:
            node-version: 24.x
       - name: Install dependencies
         run: |
                  npm ci
                  npm ls
       - name: Validate dist
         run: |
              cp dist/main.js main_pr.js
              rm -r dist
              npm install --global rollup
              npm run build
              npm run package
              echo "Files should not differ but even if they do"
              echo "It's a non blocking issue as files made in windows still work on ubuntu github action runner"
              echo "This just checks for basic consistency which is good but not always nessassary"
              diff dist/main.js main_pr.js || true
       - name: discord notify all options
         uses: ./ # Uses an action in the root directory
         with:
            webhook_url: https://discord-notify-tg-station.requestcatcher.com/
            title: Test Title
            message: Test Message
            include_image: true
            avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
            username: TestUsername
            colour: '#3371FF'
            #custom_image_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
