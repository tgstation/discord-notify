name: 'test'
on:
 push:
    branches:
        - main
 pull_request:
    branches:
        - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v6
       - name: Setup node
         uses: actions/setup-node@v6
         with:
            node-version: 24.x
       - name: Install dependencies
         run: |
                  npm ci
                  npm ls
                  npm run build
                  npm i -g @vercel/ncc
                  npm run package
         # FIXME: This always produces diffs of little numbers, see https://github.com/vercel/ncc/issues/831#issuecomment-1594540905. This test passes with no problems here so idk
       - name: Validate dist
         run: |
              cp dist/index.js index_pr.js
              rm -r dist
              npm run package
              diff dist/index.js index_pr.js
              if [ $? -ne 0 ]; then
                  echo "Files differ. This is an non blocking issue with ncc and we should have boycoted ncc by now but i don't have any other alternative. With love to CyberBoss"
                  exit 0
              fi
       - name: discord notify all options
         uses: ./ # Uses an action in the root directory
         with:
            webhook_url: https://test.requestcatcher.com/ # https://requestcatcher.com/ best domain for testing
            title: Test Title
            message: 'Test Message'
            include_image: true
            avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
            username: TestUsername
            colour: '#3371FF'
            #custom_image_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
